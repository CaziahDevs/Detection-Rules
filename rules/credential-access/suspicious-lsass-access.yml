ttle: Suspicious LSASS Access
status: experimental
description: Detects non-whitelisted processes accessing LSASS memory, which may indicate credential dumping activity.
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_access
    product: windows
detection:
    lsass_access:
        TargetImage|endswith: '\lsass.exe'
    memory_read:
        GrantedAccess|contains:
            - '0x1010'
            - '0x1410'
    filter:
        Image|startswith:
            - 'C:\Program Files\CrowdStrike\'
            - 'C:\Windows\System32\'
    condition: lsass_access and memory_read and not filter
falsepositives:
    - EDR agents
    - Backup software
    - Sysadmin diagnostic tools
level: medium